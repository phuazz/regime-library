id: hy-credit-spread-oas
name: High-Yield Credit Spread (OAS)
category: credit
description: >
  The ICE BofA US High Yield Index option-adjusted spread over Treasuries.
  Widening spreads signal rising credit stress and correlate with equity
  drawdowns; narrowing spreads indicate risk appetite is returning.

source:
  name: Internal (seed indicator, stubbed)
  note_title: null
  note_date: 2026-04-18
  url: https://fred.stlouisfed.org/series/BAMLH0A0HYM2
  received_by: phuaz@hotmail.com

criteria:
  description: >
    A bullish equity regime is indicated when high-yield OAS is below a
    chosen risk threshold and trending lower. A bearish regime is
    indicated when OAS rises above the threshold and is trending higher.
    Thresholds below are placeholder and need calibration against your
    own study of historical regimes.
  machine: "HY_OAS_bp < 400 AND HY_OAS_20d_change_bp < 0"
  inputs:
    - HY_OAS_bp
    - HY_OAS_20d_change_bp

current_state:
  status: unknown
  last_updated: null
  raw_values: {}
  notes: >
    Stubbed. Needs a FRED pull or equivalent data source to evaluate.

direction: bullish
horizon: 3m
confidence: medium
