id: spx-oversold-overbought-speed
name: SPX Oversold-to-Overbought Transition Speed
category: momentum
description: >
  A velocity-of-reversal indicator. When the S&P 500 transitions from a
  technically oversold state to an overbought state in an unusually small
  number of trading days, it signals aggressive buyer conviction after a
  capitulation low. Historically associated with durable lows and strong
  forward outperformance.

source:
  name: Ryan Detrick, CMT, Carson Investment Research
  note_title: S&P 500 Performance After Quickest RSI <30 to >70 Readings
  note_date: 2026-04-16
  url: https://x.com/RyanDetrick
  received_by: phuaz@hotmail.com
  notes: >
    Published via Ryan Detrick on X on 17 Apr 2026 (Carson Investment
    Research / Bloomberg / FactSet, data cut 4/16/2026). The study
    isolates the 10 quickest S&P 500 transitions from a 14-day RSI close
    below 30 (oversold) to a 14-day RSI close above 70 (overbought) since
    1950. Current reading of 11 trading days places this episode as the
    second fastest such transition on record, behind only the 8/23/1982
    low (6 days).

criteria:
  description: >
    Trigger when the number of trading days between the S&P 500's 14-day
    RSI closing below 30 (oversold) and subsequently closing above 70
    (overbought) is less than or equal to a fast-transition threshold.
    The threshold below is a placeholder; calibrate against the
    distribution of historical transition counts.
  machine: |
    oversold_day  = last day where SPX_RSI14 < 30
    overbought_day = first day after oversold_day where SPX_RSI14 > 70
    days_to_transition = overbought_day - oversold_day
    trigger = days_to_transition <= 15
  inputs:
    - SPX_close
    - SPX_RSI14

current_state:
  status: "on"
  last_updated: 2026-04-18
  triggered_on: 2026-04-18
  raw_values:
    days_to_transition: 11
    historical_rank: "2nd fastest transition on record (1982 was 6 days)"
  notes: >
    Status taken from self-forwarded note. Days-to-transition of 11 is
    recorded as the current reading; refresh requires either adopting the
    original study's definitions or reproducing them with RSI14.

flips_if: A new oversold print (SPX 14-day RSI closes below 30) occurs without a sub-15-day round-trip back above 70, restarting the transition clock above the threshold.

direction: bullish
horizon: 6m
confidence: medium
target_assets:
  - SPX
  - DJIA
  - NDX

historical_base_rates:
  source: Ryan Detrick / Carson Investment Research, Bloomberg / FactSet, data cut 2026-04-16. Ten historical quickest RSI<30 to RSI>70 transitions, 1950-2025.
  sample_size: 10
  verbal_summary: >
    Across the 10 historical quickest S&P 500 RSI oversold-to-overbought
    transitions (1950 to 2025), median forward returns have been 2.7% at
    1m, 5.0% at 3m, 8.9% at 6m and 17.3% at 12m, with hit rates of 80%,
    80%, 90% and 70% respectively. All four are roughly 2-3x the
    unconditional all-years baseline.
  notes: >
    Signal cases drawn from the Detrick / Carson table: 8/23/1982 (6 days,
    fastest on record), 5/26/1972 (12 days), 11/25/2016 (13), 12/16/1971
    (14), 8/14/1963 (15), 5/5/1997 (15), 11/20/2023 (15), 11/18/1952 (16),
    7/2/1959 (16), 8/23/1960 (18). For reference, the unconditional
    all-years baseline (1950-2025) is median 1.0% / 2.6% / 5.0% / 10.6%
    at 1m/3m/6m/12m with hit rates of 60.7% / 66.1% / 70.2% / 74.3%.
  returns:
    1m:  { median: 2.7, mean: 1.8, hit_rate: 0.80 }
    3m:  { median: 5.0, mean: 5.6, hit_rate: 0.80 }
    6m:  { median: 8.9, mean: 9.6, hit_rate: 0.90 }
    12m: { median: 17.3, mean: 16.3, hit_rate: 0.70 }

qualitative_note:
  date: 2026-04-18
  text: >
    This indicator captures the velocity of the rally off a low, which is
    conceptually distinct from a VIX-based volatility reset: a fast
    RSI-based round-trip can occur without the VIX ever crossing 20, and
    a VIX collapse can happen without the index making a clean oversold
    print. Treat the two as complementary rather than duplicative. Also
    note that the reference to "the 1982 lows" implies this is a rare
    event; small sample sizes deserve low confidence even when the
    directional claim is intuitively sensible.

consumers:
  - EDD
  - PCC

tags:
