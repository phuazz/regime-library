id: vix-2w-crash-magnitude
name: VIX Two-Week Crash Magnitude
category: volatility
description: >
  A magnitude-based measure of volatility collapse. The rolling two-week
  percentage decline in the VIX is ranked against its full history; the
  largest declines are associated with capitulation in volatility after a
  stress episode and have historically preceded positive forward returns.

source:
  name: Charlie Bilello, Creative Planning
  note_title: Biggest 2-Week VIX % Declines and Forward S&P 500 Total Returns
  note_date: 2026-04-18
  url: null
  received_by: phuaz@hotmail.com
  notes: >
    Table lists the 20 biggest 2-week VIX percentage declines between 1990
    and 2026, with forward S&P 500 total returns at 6-month, 1-year,
    2-year, 3-year, 4-year and 5-year horizons. Current reading of -38.1%
    (4 Oct 2026 end date, start VIX 31.05, end VIX 19.23) places this as
    the 7th biggest 2-week VIX decline on record. Data via YCharts.

criteria:
  description: >
    Trigger when the rolling two-week percentage decline in the VIX places
    in the top decile of its historical distribution. The 10% threshold is
    a placeholder; the specific rank that maps to "top 10 in history"
    should be calibrated against your own series.
  machine: "VIX_2w_pct_change <= percentile(VIX_2w_pct_change, 10)"
  inputs:
    - VIX_close
    - VIX_2w_pct_change

current_state:
  status: "on"
  last_updated: 2026-04-18
  triggered_on: 2026-04-18
  raw_values:
    VIX_start: 31.05
    VIX_end: 19.23
    VIX_2w_pct_change: -0.381
    historical_rank: "7th largest 2-week decline since 1990"
  notes: >
    Values from the Bilello / Creative Planning table. Start date 21 Mar
    2026, end date 4 Oct 2026 per the source (end date is the trigger
    anchor in the table).

flips_if: VIX 2-week percentage change rises out of the top decile of its historical distribution.

direction: bullish
horizon: 3m
confidence: medium
target_assets:
  - SPX
  - NDX

historical_base_rates:
  source: Bilello / Creative Planning, table of 20 biggest 2-week VIX declines, data via YCharts, 1990-2026.
  sample_size: 20
  verbal_summary: >
    Across the 20 biggest 2-week VIX declines since 1990, the S&P 500 has
    returned an average of +10.6% at 6 months and +17.2% at 1 year, versus
    5.8% and 12.2% in all other periods — an edge of roughly +5% at both
    horizons.
  notes: >
    1-month and 3-month returns are not disclosed in the source table, so
    those cells are left null. The 6-month figure is the published mean of
    20 historical instances. Median not supplied by the source; only the
    mean row is given. Hit rate was not stated; a conservative eyeball
    count from the table shows roughly 16 of 19 mature 6-month
    observations positive (~84%), with two material negatives around the
    2022 bear start.
  returns:
    1m:  { median: null, mean: null, hit_rate: null }
    3m:  { median: null, mean: null, hit_rate: null }
    6m:  { median: null, mean: 10.6, hit_rate: 0.84 }
    12m: { median: null, mean: 17.2, hit_rate: null }

qualitative_note:
  date: 2026-04-18
  text: >
    This indicator is orthogonal to vix-calm-regime (a threshold on the
    level) and vix-range-rank-reversal (a statistical pattern in the
    four-month range). It measures the speed of the volatility collapse
    rather than its level or pattern. Firing alongside the other two VIX
    indicators gives a stronger combined signal, but also raises the
    possibility that the three are simply rhyming facets of the same
    underlying event rather than three independent confirmations.

consumers:
  - EDD
  - PCC

tags:
  - volatility
  - vix
  - magnitude
  - crash
